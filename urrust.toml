[template]
version = "1.0.0"

[dynamic]
name = "template"
description = "A template for a new Rust project"
repository = "https://github.com/un-rust/template"
license = "Apache-2.0"

[scripts]
format = "cargo fmt"
lint = "cargo clippy"
build = "cargo build"
test = "cargo test"
test_coverage = "cargo tarpaulin --fail-under 95 --exclude-files 'src/main.rs'"
