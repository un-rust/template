output:
  - execution
  - failure

pre-commit:
  parallel: true
  commands:
    clippy:
      run: bun run lint
      glob: "*.rs"
      files: git diff --name-only --cached -- "*.rs"

    fmt:
      run: bun run format
      glob: "*.rs"
      files: git diff --name-only --cached -- "*.rs"
      stage_fixed: true

    lint_ts:
      run: bun run lint:ts
      files: git diff --name-only --cached -- "*.ts"
      stage_fixed: true

    format_ts:
      run: bun run format:ts {staged_files}
      files: git diff --name-only --cached
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: npx --no -- commitlint --edit $1
